<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101310">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TrainWise">
    <title>TrainWise</title>
    <link rel="manifest" href="./manifest.webmanifest?v=1.4.8">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=1.4.8">
    <link rel="stylesheet" href="./styles.css?v=1.4.8">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Hypertrophy coach</p>
          <h1>TrainWise</h1>
        </div>
        <button class="ghost-button" type="button" data-action="quick-backup">Backup</button>
      </header>

      <main id="app" class="app-content" aria-live="polite"></main>

      <nav class="tabbar" aria-label="Main navigation">
        <button class="tab is-active" type="button" data-tab="dashboard">Today</button>
        <button class="tab" type="button" data-tab="log">Log</button>
        <button class="tab" type="button" data-tab="trends">Trends</button>
        <button class="tab" type="button" data-tab="coach">Coach</button>
        <button class="tab" type="button" data-tab="exercises">Exercises</button>
        <button class="tab" type="button" data-tab="history">History</button>
        <button class="tab" type="button" data-tab="settings">Settings</button>
      </nav>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js?v=1.4.8" defer></script>
  </body>
</html>
